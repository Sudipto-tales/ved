schemas:
  IdResult: { type: object, required: [id], properties: { id: { type: string, format: uuid } } }

  CreateProgramInput: { type: object, required: [name, code], properties: { name: { type: string }, code: { type: string } } }
  Program:
    type: object
    required: [id, name, code, enrollment_mode, status]
    properties: { id: { type: string, format: uuid }, name: { type: string }, code: { type: string }, enrollment_mode: { type: string }, status: { type: string } }

  CreateStageInput: { type: object, required: [name, ordinal], properties: { name: { type: string }, ordinal: { type: integer } } }
  Stage:
    type: object
    required: [id, name, ordinal]
    properties: { id: { type: string, format: uuid }, name: { type: string }, ordinal: { type: integer } }
  AllStage:
    allOf:
      - $ref: '#/schemas/Stage'
      - type: object
        required: [program_id, program_name]
        properties: { program_id: { type: string, format: uuid }, program_name: { type: string } }

  CreateSubjectInput: { type: object, required: [name, code, kind], properties: { name: { type: string }, code: { type: string }, kind: { type: string } } }
  Subject:
    type: object
    required: [id, name, code, kind]
    properties: { id: { type: string, format: uuid }, name: { type: string }, code: { type: string }, kind: { type: string } }

  CreateSectionInput:
    type: object
    required: [program_stage_id, name]
    properties: { program_stage_id: { type: string, format: uuid }, name: { type: string }, capacity: { type: integer } }
  Section:
    type: object
    required: [id, name, program_stage_id, academic_year_id, capacity, stage_name, program_name]
    properties:
      id: { type: string, format: uuid }
      name: { type: string }
      program_stage_id: { type: string, format: uuid }
      academic_year_id: { type: string, format: uuid }
      capacity: { type: [integer, 'null'] }
      stage_name: { type: string }
      program_name: { type: string }

  EnrollInput: { type: object, required: [student_id], properties: { student_id: { type: string, format: uuid }, roll_no: { type: string } } }
  Enrollment:
    type: object
    required: [id, student_id, roll_no, status, login_identifier]
    properties:
      id: { type: string, format: uuid }
      student_id: { type: string, format: uuid }
      roll_no: { type: [string, 'null'] }
      status: { type: string }
      login_identifier: { type: string }

  TeachingAssignmentInput:
    type: object
    required: [section_id, subject_id, teacher_id]
    properties: { section_id: { type: string, format: uuid }, subject_id: { type: string, format: uuid }, teacher_id: { type: string, format: uuid } }
  TeachingAssignment:
    type: object
    required: [id, section_id, subject_id, teacher_id]
    properties: { id: { type: string, format: uuid }, section_id: { type: string, format: uuid }, subject_id: { type: string, format: uuid }, teacher_id: { type: string, format: uuid } }

  CreateExamInput: { type: object, required: [name, max_marks], properties: { name: { type: string }, max_marks: { type: number } } }
  Exam:
    type: object
    required: [id, name, max_marks]
    properties: { id: { type: string, format: uuid }, name: { type: string }, max_marks: { type: number } }

  CurriculumItem:
    type: object
    required: [id, subject_id, requirement, subject_name, subject_code]
    properties:
      id: { type: string, format: uuid }
      subject_id: { type: string, format: uuid }
      requirement: { type: string }
      subject_name: { type: string }
      subject_code: { type: string }

  AttendanceEntryInput: { type: object, required: [enrollment_id, status], properties: { enrollment_id: { type: string, format: uuid }, status: { type: string } } }
  MarkAttendanceInput:
    type: object
    required: [section_id, marked_by, date, entries]
    properties:
      section_id: { type: string, format: uuid }
      marked_by: { type: string, format: uuid }
      date: { type: string }
      entries: { type: array, items: { $ref: '#/schemas/AttendanceEntryInput' } }
  AttendanceRow: { type: object, required: [enrollment_id, status], properties: { enrollment_id: { type: string, format: uuid }, status: { type: string } } }

  MarkEntryInput: { type: object, required: [enrollment_id, subject_id, marks], properties: { enrollment_id: { type: string, format: uuid }, subject_id: { type: string, format: uuid }, marks: { type: number } } }
  EnterMarksInput:
    type: object
    required: [exam_id, graded_by, entries]
    properties:
      exam_id: { type: string, format: uuid }
      graded_by: { type: string, format: uuid }
      entries: { type: array, items: { $ref: '#/schemas/MarkEntryInput' } }
  MarkRow: { type: object, required: [subject_id, marks], properties: { subject_id: { type: string, format: uuid }, marks: { type: number } } }

  StudentAcademicsSummary:
    type: object
    required: [enrolled, attendance, marks]
    properties:
      enrolled: { type: boolean }
      enrollment_id: { type: string, format: uuid }
      section_name: { type: string }
      roll_no: { type: [string, 'null'] }
      status: { type: [string, 'null'] }
