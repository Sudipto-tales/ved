# academics slice contract (M5). Structure (program → stage → subject → section →
# enrollment → teaching-assignment → exam) is mutable config; attendance + marks are the
# APPEND-ONLY ledgers (corrections are new rows, latest-by-hlc wins, summed on read).
# Mirrors internal/features/academics/academics.go.
openapi: 3.1.0
info:
  title: VED academics slice
  version: 1.0.0
paths: {}

Programs:
  get:
    operationId: listPrograms
    summary: Programs
    tags: [academics]
    security: [{ bearerAuth: [] }]
    parameters: [{ $ref: '../components/common.yaml#/components/parameters/TenantIdHeader' }, { $ref: '../components/common.yaml#/components/parameters/TenantSlugHeader' }]
    responses:
      '200':
        description: Programs.
        content: { application/json: { schema: { type: object, required: [programs], properties: { programs: { type: array, items: { $ref: '#/schemas/Program' } } } } } }
      '401': { $ref: '../components/common.yaml#/components/responses/Unauthorized' }
      '403': { $ref: '../components/common.yaml#/components/responses/Forbidden' }
      '500': { $ref: '../components/common.yaml#/components/responses/Internal' }
  post:
    operationId: createProgram
    summary: Create a program
    tags: [academics]
    security: [{ bearerAuth: [] }]
    parameters: [{ $ref: '../components/common.yaml#/components/parameters/TenantIdHeader' }, { $ref: '../components/common.yaml#/components/parameters/TenantSlugHeader' }]
    requestBody: { required: true, content: { application/json: { schema: { $ref: '#/schemas/CreateProgramInput' } } } }
    responses:
      '201': { description: Created., content: { application/json: { schema: { $ref: '#/schemas/IdResult' } } } }
      '400': { $ref: '../components/common.yaml#/components/responses/BadRequest' }
      '401': { $ref: '../components/common.yaml#/components/responses/Unauthorized' }
      '403': { $ref: '../components/common.yaml#/components/responses/Forbidden' }
      '500': { $ref: '../components/common.yaml#/components/responses/Internal' }

