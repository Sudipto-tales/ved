# identity slice contract (M1). The auth bridge: login/refresh (public) + the
# identity-global authed endpoints (me/memberships, reset-password) that run BEFORE tenant
# selection — so these carry NO X-Tenant-* header. Mirrors internal/features/identity.
openapi: 3.1.0
info:
  title: VED identity slice
  version: 1.0.0
paths: {}

Login:
  post:
    operationId: login
    summary: Exchange credentials for access + refresh tokens
    tags: [identity]
    security: []   # public
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '#/schemas/LoginInput' }
    responses:
      '200':
        description: Authenticated.
        content:
          application/json:
            schema: { $ref: '#/schemas/LoginResult' }
      '400': { $ref: '../components/common.yaml#/components/responses/BadRequest' }
      '401':
        description: Invalid credentials.
        content: { application/json: { schema: { $ref: '../components/common.yaml#/components/schemas/Error' } } }
      '403':
        description: Account is not active.
        content: { application/json: { schema: { $ref: '../components/common.yaml#/components/schemas/Error' } } }
      '500': { $ref: '../components/common.yaml#/components/responses/Internal' }

Refresh:
  post:
    operationId: refresh
    summary: Rotate the access token using a refresh token
    tags: [identity]
    security: []   # public
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '#/schemas/RefreshInput' }
    responses:
      '200':
        description: Refreshed.
        content:
          application/json:
            schema: { $ref: '#/schemas/LoginResult' }
      '400': { $ref: '../components/common.yaml#/components/responses/BadRequest' }
      '401':
        description: Invalid/expired refresh token.
        content: { application/json: { schema: { $ref: '../components/common.yaml#/components/schemas/Error' } } }
      '500': { $ref: '../components/common.yaml#/components/responses/Internal' }

MeMemberships:
  get:
    operationId: getMyMemberships
    summary: The caller's identity + memberships (pre-tenant-selection)
    tags: [identity]
    security: [{ bearerAuth: [] }]
    responses:
      '200':
        description: Identity + memberships.
        content:
          application/json:
            schema: { $ref: '#/schemas/MembershipsResult' }
      '401': { $ref: '../components/common.yaml#/components/responses/Unauthorized' }
      '500': { $ref: '../components/common.yaml#/components/responses/Internal' }

ResetPassword:
  post:
    operationId: resetPassword
    summary: Reset the caller's password (forced on first login)
    tags: [identity]
    security: [{ bearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '#/schemas/ResetPasswordInput' }
    responses:
      '204':
        description: Password reset.
      '400': { $ref: '../components/common.yaml#/components/responses/BadRequest' }
      '401': { $ref: '../components/common.yaml#/components/responses/Unauthorized' }
      '500': { $ref: '../components/common.yaml#/components/responses/Internal' }

schemas:
  LoginInput:
    type: object
    required: [login_identifier, password]
    properties:
      login_identifier: { type: string }
      password: { type: string }

  RefreshInput:
    type: object
    required: [refresh_token]
    properties:
      refresh_token: { type: string }

  MembershipDTO:
    type: object
    required: [membership_id, tenant_id, user_type]
    properties:
      membership_id: { type: string, format: uuid }
      tenant_id: { type: string, format: uuid }
      user_type: { type: string }

  LoginResult:
    type: object
    required: [access_token, refresh_token, must_reset_password, memberships]
    properties:
      access_token: { type: string }
      refresh_token: { type: string }
      must_reset_password: { type: boolean }
      memberships:
        type: array
        items: { $ref: '#/schemas/MembershipDTO' }

  MembershipsResult:
    type: object
    required: [user_id, must_reset_password, memberships]
    properties:
      user_id: { type: string, format: uuid }
      must_reset_password: { type: boolean }
      memberships:
        type: array
        items: { $ref: '#/schemas/MembershipDTO' }

  ResetPasswordInput:
    type: object
    required: [current_password, new_password]
    properties:
      current_password: { type: string }
      new_password: { type: string }
