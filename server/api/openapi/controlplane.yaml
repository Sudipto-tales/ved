# VED Control Plane API — the SEPARATE central-cloud contract (M4). A different binary
# (cmd/controlplane), schema (control_plane), and permission namespace (platform.*) from
# the tenant node. No tenant_id / RLS / X-Tenant-* here — control-plane writes are plain
# transactional. Consumed by the platform SPA (web/platform). Mirrors
# internal/features/registration/registration.go.
#
# Regenerate the platform TS client:  (web/) npm run gen:api:platform
openapi: 3.1.0
info:
  title: VED Control Plane API
  version: 1.0.0
  description: >
    School registration, payment-proof review, approval (state machine →
    tenant ACTIVE + subscription + gapless invoice + signed license +
    cross-plane provisioning), and platform read views.
servers:
  - url: http://localhost:8080
    description: Dev control plane

security:
  - platformBearer: []

tags:
  - name: registration
    description: Public school self-registration + payment proof.
  - name: platform
    description: Superadmin review/approve/reject + tenant & license views (platform.* namespace).

paths:
  /api/v1/plans:
    get:
      operationId: listPlans
      summary: Public plan catalog
      tags: [registration]
      security: []
      responses:
        '200':
          description: Active plans.
          content:
            application/json:
              schema: { type: object, required: [plans], properties: { plans: { type: array, items: { $ref: '#/components/schemas/Plan' } } } }
        '500': { $ref: '#/components/responses/Internal' }

  /api/v1/register:
    post:
      operationId: registerSchool
      summary: Register a school (public)
      tags: [registration]
      security: []
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/RegisterInput' } } } }
      responses:
        '201': { description: Registered (PENDING_PAYMENT_REVIEW)., content: { application/json: { schema: { $ref: '#/components/schemas/Registration' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/Internal' }

  /api/v1/registrations/{id}:
    get:
      operationId: getRegistration
      summary: Public registration status (signup site polls this)
      tags: [registration]
      security: []
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: Registration., content: { application/json: { schema: { $ref: '#/components/schemas/Registration' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }

  /api/v1/registrations/{id}/payment-proof:
    post:
      operationId: submitPaymentProof
      summary: Submit a payment proof (public)
      tags: [registration]
      security: []
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/ProofInput' } } } }
      responses:
        '202': { description: Proof accepted for review. }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }

  /api/v1/platform/registrations:
    get:
      operationId: listRegistrations
      summary: All registrations (review queue)
      tags: [platform]
      responses:
        '200':
          description: Registrations.
          content:
            application/json:
              schema:
                type: object
                required: [registrations]
                properties:
                  registrations: { type: array, items: { $ref: '#/components/schemas/Registration' } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/Internal' }

  /api/v1/platform/registrations/{id}:
    get:
      operationId: getRegistrationDetail
      summary: Registration + its payment proof
      tags: [platform]
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: Detail., content: { application/json: { schema: { $ref: '#/components/schemas/RegistrationDetail' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/Internal' }

  /api/v1/platform/payment-proofs:
    get:
      operationId: listPaymentProofs
      summary: All payment proofs
      tags: [platform]
      responses:
        '200':
          description: Proofs.
          content:
            application/json:
              schema:
                type: object
                required: [payment_proofs]
                properties:
                  payment_proofs: { type: array, items: { $ref: '#/components/schemas/Proof' } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/Internal' }

  /api/v1/platform/registrations/{id}/approve:
    post:
      operationId: approveRegistration
      summary: Approve → provision (state machine + gapless invoice + license + tenant admin)
      tags: [platform]
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: Provisioned. The one-time admin credential is returned ONCE., content: { application/json: { schema: { $ref: '#/components/schemas/ApproveResult' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/Internal' }

  /api/v1/platform/registrations/{id}/reject:
    post:
      operationId: rejectRegistration
      summary: Reject a registration
      tags: [platform]
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      requestBody: { required: false, content: { application/json: { schema: { $ref: '#/components/schemas/RejectInput' } } } }
      responses:
        '204': { description: Rejected. }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/Internal' }

  /api/v1/platform/tenants:
    get:
      operationId: listTenants
      summary: Provisioned tenants
      tags: [platform]
      responses:
        '200':
          description: Tenants.
          content:
            application/json:
              schema:
                type: object
                required: [tenants]
                properties:
                  tenants: { type: array, items: { $ref: '#/components/schemas/Tenant' } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/Internal' }

  /api/v1/platform/licenses:
    get:
      operationId: listLicenses
      summary: Issued licenses
      tags: [platform]
      responses:
        '200':
          description: Licenses.
          content:
            application/json:
              schema:
                type: object
                required: [licenses]
                properties:
                  licenses: { type: array, items: { $ref: '#/components/schemas/License' } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/Internal' }

  /api/v1/platform/search:
    get:
      operationId: platformSearch
      summary: Permission-scoped global search across control-plane entities
      tags: [platform]
      description: >
        Searches registrations, tenants, subscriptions, plans and licenses, grouped
        by type. An entity is queried only if the caller is permitted to manage it
        (today: superadmin only). The `types` filter can only narrow the permitted
        set. Queries shorter than 2 characters return empty. Debounce ~250ms.
      parameters:
        - { name: q, in: query, required: true, description: "Search text (min 2 chars).", schema: { type: string } }
        - { name: types, in: query, required: false, description: "Comma-separated entity types to narrow.", schema: { type: string } }
        - { name: limit, in: query, required: false, description: "Per-entity cap (default 5, max 10).", schema: { type: integer, minimum: 1, maximum: 10 } }
      responses:
        '200':
          description: Hits grouped by entity type (only permitted types present).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlatformSearchResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/Internal' }

  /api/v1/platform/support/analytics:
    get:
      operationId: supportAnalytics
      summary: Support queue counts (open / pending / resolved)
      tags: [platform]
      responses:
        '200': { description: Counts., content: { application/json: { schema: { $ref: '#/components/schemas/SupportAnalytics' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/Internal' }

  /api/v1/platform/support/tickets:
    get:
      operationId: listSupportTickets
      summary: List support tickets (optionally filtered by status)
      tags: [platform]
      parameters:
        - { name: status, in: query, required: false, description: "open | pending | resolved | all", schema: { type: string } }
      responses:
        '200':
          description: Tickets, newest-active first.
          content:
            application/json:
              schema:
                type: object
                required: [tickets]
                properties:
                  tickets: { type: array, items: { $ref: '#/components/schemas/SupportTicket' } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/Internal' }
    post:
      operationId: createSupportTicket
      summary: Open a ticket (log one on a school's behalf)
      tags: [platform]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/CreateTicketInput' } } } }
      responses:
        '201': { description: Created ticket + first message., content: { application/json: { schema: { $ref: '#/components/schemas/SupportThread' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/Internal' }

  /api/v1/platform/support/tickets/{id}:
    get:
      operationId: getSupportThread
      summary: One ticket with its full message thread
      tags: [platform]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Ticket + ordered messages., content: { application/json: { schema: { $ref: '#/components/schemas/SupportThread' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }

  /api/v1/platform/support/tickets/{id}/reply:
    post:
      operationId: replySupportTicket
      summary: Append a platform reply to a ticket
      tags: [platform]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [body], properties: { body: { type: string } } } } } }
      responses:
        '201': { description: Updated thread., content: { application/json: { schema: { $ref: '#/components/schemas/SupportThread' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }

  /api/v1/platform/support/tickets/{id}/status:
    post:
      operationId: setSupportTicketStatus
      summary: Change a ticket's status
      tags: [platform]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [status], properties: { status: { type: string, enum: [open, pending, resolved] } } } } } }
      responses:
        '200': { description: OK., content: { application/json: { schema: { type: object, properties: { ok: { type: boolean } } } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }

components:
  securitySchemes:
    platformBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Platform superadmin JWT (separate issuer + secret from tenant tokens).

  responses:
    Unauthorized: { description: Missing/invalid platform token., content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    Forbidden: { description: Lacks the platform.* permission., content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    BadRequest: { description: Malformed input., content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    NotFound: { description: Not found., content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    Conflict: { description: Slug already taken., content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    Internal: { description: Server error., content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  schemas:
    Error: { type: object, required: [error], properties: { error: { type: string } } }

    PlatformSearchHit:
      type: object
      required: [type, id, label, sublabel, url, score]
      properties:
        type: { type: string, description: "registration | tenant | subscription | plan | license" }
        id: { type: string, format: uuid }
        label: { type: string }
        sublabel: { type: string }
        url: { type: string }
        score: { type: number }

    PlatformSearchResponse:
      type: object
      required: [query, groups]
      properties:
        query: { type: string }
        groups:
          type: object
          additionalProperties:
            type: array
            items: { $ref: '#/components/schemas/PlatformSearchHit' }

    SupportAnalytics:
      type: object
      required: [open, pending, resolved]
      properties:
        open: { type: integer }
        pending: { type: integer }
        resolved: { type: integer }

    SupportTicket:
      type: object
      required: [id, school_name, subject, priority, status, last_message_at, created_at, message_count]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid, nullable: true }
        school_name: { type: string }
        subject: { type: string }
        priority: { type: string, enum: [low, normal, high] }
        status: { type: string, enum: [open, pending, resolved] }
        last_message_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        message_count: { type: integer }

    SupportMessage:
      type: object
      required: [id, ticket_id, author_type, author_name, body, created_at]
      properties:
        id: { type: string, format: uuid }
        ticket_id: { type: string, format: uuid }
        author_type: { type: string, enum: [SCHOOL, PLATFORM] }
        author_name: { type: string }
        body: { type: string }
        created_at: { type: string, format: date-time }

    SupportThread:
      type: object
      required: [ticket, messages]
      properties:
        ticket: { $ref: '#/components/schemas/SupportTicket' }
        messages: { type: array, items: { $ref: '#/components/schemas/SupportMessage' } }

    CreateTicketInput:
      type: object
      required: [subject, body]
      properties:
        tenant_id: { type: string, format: uuid }
        school_name: { type: string }
        subject: { type: string }
        priority: { type: string, enum: [low, normal, high] }
        body: { type: string }

    Plan:
      type: object
      required: [id, name, tier, currency, price, billing_cycle, seats]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        tier: { type: string }
        currency: { type: string }
        price: { type: number }
        billing_cycle: { type: string }
        seats: { type: integer }
        enabled_modules: {}

    RegisterInput:
      type: object
      required: [school_name, slug, admin_name, admin_email, plan_id]
      properties:
        school_name: { type: string }
        slug: { type: string }
        admin_name: { type: string }
        admin_email: { type: string }
        admin_phone: { type: string }
        plan_id: { type: string }

    ProofInput:
      type: object
      required: [amount, currency, method, txn_id, payer_name]
      properties:
        amount: { type: number }
        currency: { type: string }
        method: { type: string }
        txn_id: { type: string }
        payer_name: { type: string }
        paid_at: { type: string }
        storage_key: { type: string }

    RejectInput:
      type: object
      properties:
        reason: { type: string }

    Registration:
      type: object
      required: [id, school_name, slug, admin_name, admin_email, status, created_at]
      properties:
        id: { type: string, format: uuid }
        school_name: { type: string }
        slug: { type: string }
        admin_name: { type: string }
        admin_email: { type: string }
        status: { type: string }
        proof_status: { type: [string, 'null'] }
        tenant_id: { type: [string, 'null'], format: uuid }
        created_at: { type: string, format: date-time }

    Proof:
      type: object
      required: [id, registration_id, school_name, slug, amount, currency, method, txn_id, status, created_at]
      properties:
        id: { type: string, format: uuid }
        registration_id: { type: string, format: uuid }
        school_name: { type: string }
        slug: { type: string }
        amount: { type: number }
        currency: { type: string }
        method: { type: string }
        txn_id: { type: string }
        payer_name: { type: [string, 'null'] }
        paid_at: { type: [string, 'null'], format: date-time }
        storage_key: { type: [string, 'null'] }
        status: { type: string }
        reject_reason: { type: [string, 'null'] }
        created_at: { type: string, format: date-time }

    RegistrationDetail:
      type: object
      required: [registration]
      properties:
        registration: { $ref: '#/components/schemas/Registration' }
        proof: { $ref: '#/components/schemas/Proof' }

    ApproveResult:
      type: object
      required: [tenant_id, slug, subscription_id, invoice_number, license_id, admin_login, admin_temp_password, license_expires_at]
      properties:
        tenant_id: { type: string, format: uuid }
        slug: { type: string }
        subscription_id: { type: string, format: uuid }
        invoice_number: { type: string }
        license_id: { type: string, format: uuid }
        admin_login: { type: string }
        admin_temp_password: { type: string }
        license_expires_at: { type: string, format: date-time }

    Tenant:
      type: object
      required: [id, slug, name, status]
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        name: { type: string }
        status: { type: string }
        provisioned_at: { type: [string, 'null'], format: date-time }

    License:
      type: object
      required: [id, tenant_slug, plan, seats, issued_at, expires_at, revoked]
      properties:
        id: { type: string, format: uuid }
        tenant_slug: { type: string }
        plan: { type: string }
        seats: { type: integer }
        issued_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }
        revoked: { type: boolean }
