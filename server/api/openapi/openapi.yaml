# VED tenant-node API — the frozen contract (bridges.md §1). The single source of
# truth: Orval generates the TS client + Zod schemas from this; Go handlers mirror it.
#
# Structure: this root holds info/servers/security + shared components (common.yaml);
# each slice lives in paths/<slice>.yaml and is pulled in below via $ref. Add a slice
# by dropping a paths/<slice>.yaml and listing its operations here.
#
# Regenerate the TS client:  (web/) npm run gen:api
openapi: 3.1.0
info:
  title: VED Tenant Node API
  version: 1.0.0
  description: >
    Per-school tenant-plane API. Every route is authenticated (Bearer JWT) and
    tenant-scoped (X-Tenant-ID or X-Tenant-Slug → RLS). Permissions are enforced
    by authz.Require per route (docs/05).
servers:
  - url: /
    description: Same-origin (subdomain host sends X-Tenant-Slug)
  - url: http://localhost:8080
    description: Dev node (bare host sends X-Tenant-ID)

security:
  - bearerAuth: []

tags:
  - name: students
    description: Admissions, roster, and the guardian directory (M3 reference slice).
  - name: teachers
    description: Teaching-staff onboarding and roster (M5).
  - name: staff
    description: Non-teaching staff onboarding and roster (M5).
  - name: access
    description: RBAC — roles, designations, member-role assignment, tenant-setup reads (M2).
  - name: finance
    description: Append-only fee ledger — fee heads, invoices (DEBIT), payments (CREDIT), derived outstanding (M5).
  - name: academics
    description: Structure (program→stage→subject→section→enrollment→exam) + append-only attendance & marks (M5).
  - name: learning
    description: LMS — assignments, materials, append-only submissions & grading → marks ledger (M8).
  - name: identity
    description: Auth — login/refresh (public) + me/memberships + reset-password (M1).
  - name: guardian
    description: Child-scoped portal over students/academics/finance (M7).
  - name: search
    description: Permission-scoped global search across tenant entities (navbar command palette).
  - name: support
    description: School-side support tickets — raise a request and exchange messages with the platform.

