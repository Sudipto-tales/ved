# Wildcard *.ved.test → 127.0.0.1 for local subdomain routing (docs/25).
# Install: copy to /etc/dnsmasq.d/ (or `dnsmasq --conf-file=`), restart dnsmasq, and make
# 127.0.0.1 your resolver for .test. Then lincoln.ved.test, maple.ved.test,
# platform.ved.test all resolve to localhost (→ the nginx container). The admin area is the
# /admin path under each school host, not a subdomain.
#
# No dnsmasq? Add explicit /etc/hosts lines instead (one per school), e.g.:
#   127.0.0.1  lincoln.ved.test maple.ved.test platform.ved.test
address=/ved.test/127.0.0.1
