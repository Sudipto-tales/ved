# VED subdomain routing (local dev). docs/25-subdomain-routing.md
#
# One bundle, many subdomains. Each tenant subdomain ({slug}.ved.test) serves the ONE
# tenant SPA and proxies the API same-origin (no CORS), injecting the tenant slug from the
# host. There is no separate admin door — admin, staff, teacher, student and guardian all
# sign in at {slug}.ved.test; the role (not the address) decides the experience, so there is
# no "-admin" subdomain and no /admin path. platform.ved.test serves the platform SPA + control plane.
#
# In dev this nginx runs as a container on the compose network and proxies to the Vite dev
# servers + the Go services by their service names. Requires a wildcard DNS for *.ved.test
# pointing at 127.0.0.1 (dnsmasq: deploy/dnsmasq/ved-test.conf, or /etc/hosts entries).

# ---- Tenant subdomains: {slug}.ved.test (one door for every role; no -admin host) ----
server {
    listen 80;
    # The leftmost label IS the tenant slug (e.g. "lincoln").
    server_name ~^(?<slug>[a-z0-9-]+)\.ved\.test$;

    # API — same origin → no CORS. The node listens on 8091 inside its container.
    location ~ ^/(api|auth|healthz) {
        proxy_pass http://node:8091;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Authoritative tenant identity from the subdomain (overrides any client value).
        proxy_set_header X-Tenant-Slug     $slug;
    }

    # The tenant SPA (Vite dev server in dev; swap for `root /var/www/ved-tenant;` in prod).
    location / {
        proxy_pass http://web:5173;
        proxy_set_header Host $host;
        proxy_http_version 1.1;                 # Vite HMR websocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ---- Platform / superadmin + public signup: platform.ved.test ----
server {
    listen 80;
    server_name platform.ved.test;

    location ~ ^/(api|healthz) {
        proxy_pass http://controlplane:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location / {
        proxy_pass http://platform-web:5174;    # the platform SPA dev server
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ---- Apex: ved.test → marketing landing + public signup (platform SPA, public routes) ----
# The same platform bundle as platform.ved.test; on the apex the app opens on the marketing
# landing ("/"), while platform.ved.test is the superadmin door. Exact server_name, so it
# never collides with the {slug}.ved.test tenant regex above (which needs a label prefix).
server {
    listen 80;
    server_name ved.test;

    location ~ ^/(api|healthz) {
        proxy_pass http://controlplane:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location / {
        proxy_pass http://platform-web:5174;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
